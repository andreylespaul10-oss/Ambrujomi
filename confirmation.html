<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed | Bliss Glow</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body data-page="confirmation">

<div id="site-header"></div>

<div class="container">
  <div class="confirm-box">
    <div class="big">🎉</div>
    <span class="eyebrow">Order confirmed</span>
    <h1>Thank you for your order!</h1>
    <div class="order-no" id="conf-number">BG-00000</div>
    <p>We've sent a confirmation to <b id="conf-email">your email</b>. You'll receive a tracking link as soon as your parcel ships — usually within 24 hours.</p>
    <div class="co-section" style="text-align:left;margin-top:26px">
      <h3>Order details</h3>
      <ul class="mini-order-list" id="conf-items"></ul>
    </div>
    <div class="hero-ctas" style="justify-content:center;margin-top:10px">
      <a class="btn btn-primary" href="account.html#orders">Track my order</a>
      <a class="btn btn-secondary" href="shop.html">Continue shopping</a>
    </div>
  </div>
</div>

<div id="site-footer"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
